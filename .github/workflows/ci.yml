name: ci

on:
  pull_request:
  push:
    branches:
      - master

jobs:
  python-uv-ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        python-version:
          - "3.10"
          - "3.11"
          - "3.12"
          - "3.13"
    name: Python ${{ matrix.python-version }} uv CI
    steps:
      - uses: actions/checkout@v5

      - uses: cobycloud/actions/actions/uv-monorepo-ci@main
        with:
          python-version: ${{ matrix.python-version }}
          package-path: "."
          install-command: uv sync --all-groups
          compile-command: uv run python -m compileall src tests
          test-command: uv run python -m unittest discover -s tests -v
