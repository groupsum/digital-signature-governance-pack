  "status_notes": [
    "Seed SPEC for review workflow. It defines how candidate standards are promoted into future pack documents."
  ],
  "scope": [
    "HTTP caching and freshness standards target discovery",
    "ADR/SPEC inclusion triage",
    "candidate status labeling as core, supporting, historical, watchlist, or excluded"
  ],
  "requirements": [
    {
      "id": "CFGP-0900-001",
      "text": "The pack SHALL maintain a standards target inventory before creating detailed cache/freshness ADRs and SPECs."
    },
    {
      "id": "CFGP-0900-002",
      "text": "The inventory SHALL distinguish current core RFC targets from supporting syntax/registry targets and historical superseded RFCs."
    },
    {
      "id": "CFGP-0900-003",
      "text": "The inventory SHALL identify non-IETF or vendor-specific cache surfaces as watchlist or out-of-scope unless explicitly accepted by a later ADR."
    },
    {
      "id": "CFGP-0900-004",
      "text": "Future normative SPECs SHALL cite the current RFC target when an older RFC has been obsoleted."
    },
    {
      "id": "CFGP-0900-005",
      "text": "Future SPEC rows SHOULD be split by governed behavior surface rather than by vendor implementation."
    }
  ],
  "candidate_behavior_surfaces": [
    "freshness calculation",
    "cacheability and storage",
    "cache keys and representation selection",
    "validators and conditional requests",
    "ETag and Last-Modified governance",
    "Cache-Control and Expires policy",
    "stale-while-revalidate and stale-if-error",
    "immutable responses",
    "shared cache and CDN-targeted directives",
    "cache diagnostics and Cache-Status",
    "cache grouping and invalidation",
    "structured field parsing for cache extensions"
  ],
  "review_artifact": "docs/standards/cache-freshness-rfc-ietf-targets.md"
}
